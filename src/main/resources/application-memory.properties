# YesBoss Memory Cache Configuration
# This file contains the configuration for the memory cache system

# =============================================================================
# Basic Cache Configuration
# =============================================================================

# Maximum number of entries in the cache
cache.maxSize=10000

# Time after which entries expire after being written (format: Xh, Xm, Xs)
cache.expireAfterWrite=1h

# Time after which entries expire after being accessed
cache.expireAfterAccess=30m

# Time after which entries should be refreshed
# cache.refreshAfterWrite=15m

# Enable cache statistics collection
cache.recordStats=true

# Number of threads that can concurrently write to the cache
cache.concurrencyLevel=4

# =============================================================================
# Multi-Level Cache Configuration
# =============================================================================

# Enable multi-level caching (L1 + L2)
cache.multiLevel.enabled=false

# L2 cache configuration (only used if multiLevel.enabled=true)
cache.multiLevel.l2.maxSize=100000
cache.multiLevel.l2.expireAfterWrite=24h

# =============================================================================
# Metrics and Monitoring Configuration
# =============================================================================

# Slow operation threshold in milliseconds
cache.metrics.slowOperationThreshold=100

# Hit rate alert threshold (0.0 to 1.0)
cache.metrics.hitRateAlertThreshold=0.8

# Size alert threshold (0 to disable)
cache.metrics.sizeAlertThreshold=0

# =============================================================================
# Cache Names
# =============================================================================

# Available cache instances
cache.names=resources,snippets,preferences,sessions,embeddings

# =============================================================================
# Performance Tuning
# =============================================================================

# Maintenance task interval in minutes
cache.maintenance.intervalMinutes=5

# Batch size for bulk operations
cache.batchSize=100

# Enable async operations
cache.async.enabled=true

# =============================================================================
# Environment Variable Override
# =============================================================================
# Any of these properties can be overridden using environment variables
# with the prefix YESBOSS_CACHE_
#
# Example:
#   YESBOSS_CACHE_MAXSIZE=20000
#   YESBOSS_CACHE_EXPIREAFTERWRITE=2h
#   YESBOSS_CACHE_MULTILEVEL_ENABLED=true
