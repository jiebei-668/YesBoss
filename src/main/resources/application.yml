# YesBoss Configuration File
# Environment variables can be substituted using ${VAR_NAME:default} syntax

# =============================================================================
# LLM Provider Configuration
# =============================================================================
llm:
  # Anthropic Claude Configuration
  anthropic:
    enabled: ${ANTHROPIC_ENABLED:true}
    api-key: ${ANTHROPIC_API_KEY:}
    base-url: ${ANTHROPIC_BASE_URL:https://api.anthropic.com}
    model:
      master: ${ANTHROPIC_MODEL_MASTER:claude-sonnet-4-20250514}
      worker: ${ANTHROPIC_MODEL_WORKER:claude-haiku-4-20250514}
    max-tokens: ${ANTHROPIC_MAX_TOKENS:8192}
    temperature: ${ANTHROPIC_TEMPERATURE:0.7}
    timeout-seconds: ${ANTHROPIC_TIMEOUT:120}

  # Google Gemini Configuration
  gemini:
    enabled: ${GEMINI_ENABLED:false}
    api-key: ${GEMINI_API_KEY:}
    base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
    model:
      master: ${GEMINI_MODEL_MASTER:gemini-2.0-flash-exp}
      worker: ${GEMINI_MODEL_WORKER:gemini-1.5-flash}
    max-tokens: ${GEMINI_MAX_TOKENS:8192}
    temperature: ${GEMINI_TEMPERATURE:0.7}
    timeout-seconds: ${GEMINI_TIMEOUT:120}

  # OpenAI GPT Configuration
  openai:
    enabled: ${OPENAI_ENABLED:false}
    api-key: ${OPENAI_API_KEY:}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com}
    model:
      master: ${OPENAI_MODEL_MASTER:gpt-4o}
      worker: ${OPENAI_MODEL_WORKER:gpt-4o-mini}
    max-tokens: ${OPENAI_MAX_TOKENS:16384}
    temperature: ${OPENAI_TEMPERATURE:0.7}
    timeout-seconds: ${OPENAI_TIMEOUT:120}

  # Zhipu GLM Configuration
  zhipu:
    enabled: ${ZHIPU_ENABLED:false}
    api-key: ${ZHIPU_API_KEY:}
    base-url: ${ZHIPU_BASE_URL:https://open.bigmodel.cn}
    model:
      master: ${ZHIPU_MODEL_MASTER:glm-4-plus}
      worker: ${ZHIPU_MODEL_WORKER:glm-4-flash}
    max-tokens: ${ZHIPU_MAX_TOKENS:8192}
    temperature: ${ZHIPU_TEMPERATURE:0.7}
    timeout-seconds: ${ZHIPU_TIMEOUT:120}

# =============================================================================
# IM Platform Configuration
# =============================================================================
im:
  # Feishu Configuration
  feishu:
    enabled: ${FEISHU_ENABLED:true}
    app-id: ${FEISHU_APP_ID:}
    app-secret: ${FEISHU_APP_SECRET:}
    encrypt-key: ${FEISHU_ENCRYPT_KEY:}
    verification-token: ${FEISHU_VERIFICATION_TOKEN:}
    webhook:
      path: ${FEISHU_WEBHOOK_PATH:/webhook/feishu}
      port: ${FEISHU_WEBHOOK_PORT:8080}
    push:
      base-url: ${FEISHU_PUSH_BASE_URL:https://open.feishu.cn}
      message-api: ${FEISHU_MESSAGE_API:/open-apis/im/v1/messages}
    timeout-seconds: ${FEISHU_TIMEOUT:30}

  # Slack Configuration
  slack:
    enabled: ${SLACK_ENABLED:false}
    signing-secret: ${SLACK_SIGNING_SECRET:}
    bot-token: ${SLACK_BOT_TOKEN:}
    webhook:
      path: ${SLACK_WEBHOOK_PATH:/webhook/slack}
      port: ${SLACK_WEBHOOK_PORT:8080}
    push:
      base-url: ${SLACK_PUSH_BASE_URL:https://slack.com/api}
      chat-api: ${SLACK_CHAT_API:/api/chat.postMessage}
    timeout-seconds: ${SLACK_TIMEOUT:30}

# =============================================================================
# Database Configuration
# =============================================================================
database:
  type: ${DB_TYPE:sqlite}
  sqlite:
    path: ${SQLITE_PATH:data/yesboss.db}
    pool:
      enabled: ${SQLITE_POOL_ENABLED:false}
      max-connections: ${SQLITE_POOL_MAX:10}
      connection-timeout-ms: ${SQLITE_POOL_TIMEOUT:30000}
    journal-mode: ${SQLITE_JOURNAL_MODE:WAL}
    synchronous: ${SQLITE_SYNCHRONOUS:NORMAL}
    cache-size: ${SQLITE_CACHE_SIZE:-2000}
    temp-store: ${SQLITE_TEMP_STORE:MEMORY}

# =============================================================================
# Scheduler Configuration
# =============================================================================
scheduler:
  # Circuit Breaker Configuration
  circuit-breaker:
    max-loop-count: ${CIRCUIT_BREAKER_MAX_LOOPS:20}
    check-interval-ms: ${CIRCUIT_BREAKER_CHECK_INTERVAL:100}

  # Condensation Engine Configuration
  condensation:
    token-threshold: ${CONDENSATION_TOKEN_THRESHOLD:120000}
    summarization-interval-ms: ${CONDENSATION_INTERVAL:60000}
    max-messages-to-condense: ${CONDENSATION_MAX_MESSAGES:100}

  # Thread Pool Configuration
  thread-pool:
    virtual-threads-enabled: ${VIRTUAL_THREADS_ENABLED:true}
    platform-thread-pool-size: ${PLATFORM_THREAD_POOL_SIZE:16}
    queue-capacity: ${THREAD_QUEUE_CAPACITY:1000}
    keep-alive-seconds: ${THREAD_KEEP_ALIVE:60}

# =============================================================================
# Sandbox Security Configuration
# =============================================================================
sandbox:
  enabled: ${SANDBOX_ENABLED:true}
  # Tool Name Blacklist (exact match)
  tool-name-blacklist:
    - format_disk
    - delete_all
    - wipe_system
    - drop_database

  # Argument Blacklist (regex patterns)
  argument-blacklist:
    - rm\s+-rf\s+/
    - curl.*\|\s*bash
    - wget.*\|\s*sh
    - eval\s*\(
    - chmod\s+000
    - chown\s+-R
    - dd\s+if=
    - >\s*/dev/
    - mkfs\.
    - fdisk
    - :\(\)\{\s*:\|:\s*;\s*\}\

  # Suspicious file paths
  path-blacklist:
    - /etc/passwd
    - /etc/shadow
    - ~/.ssh/
    - /root/
    - /boot/
    - /sys/

# =============================================================================
# Logging Configuration
# =============================================================================
logging:
  level: ${LOG_LEVEL:INFO}
  format: ${LOG_FORMAT:text}
  # Console Logging
  console:
    enabled: ${LOG_CONSOLE_ENABLED:true}
    colorized: ${LOG_CONSOLE_COLOR:true}
  # File Logging
  file:
    enabled: ${LOG_FILE_ENABLED:true}
    path: ${LOG_FILE_PATH:logs/yesboss.log}
    max-size: ${LOG_FILE_MAX_SIZE:100MB}
    max-history: ${LOG_FILE_MAX_HISTORY:30}
    total-capacity: ${LOG_FILE_TOTAL_CAPACITY:1GB}
  # Specific Component Log Levels
  components:
    llm: ${LOG_LEVEL_LLM:DEBUG}
    persistence: ${LOG_LEVEL_PERSISTENCE:INFO}
    scheduler: ${LOG_LEVEL_SCHEDULER:INFO}
    sandbox: ${LOG_LEVEL_SANDBOX:WARN}

# =============================================================================
# Application Configuration
# =============================================================================
app:
  name: YesBoss
  version: ${APP_VERSION:1.0.0}
  environment: ${APP_ENV:development}
  # Server Configuration
  server:
    host: ${SERVER_HOST:0.0.0.0}
    port: ${SERVER_PORT:8080}
    context-path: ${SERVER_CONTEXT_PATH:/}
  # Task Execution
  task:
    default-timeout-minutes: ${TASK_DEFAULT_TIMEOUT:60}
    max-concurrent-tasks: ${TASK_MAX_CONCURRENT:10}
  # Human-in-the-Loop
  hitl:
    approval-timeout-minutes: ${HITL_APPROVAL_TIMEOUT:30}
    max-retries: ${HITL_MAX_RETRIES:3}
