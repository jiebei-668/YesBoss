# YesBoss Configuration File
# Environment variables can be substituted using ${VAR_NAME:default} syntax

# =============================================================================
# LLM Provider Configuration
# =============================================================================
llm:
  # Anthropic Claude Configuration
  anthropic:
    enabled: ${ANTHROPIC_ENABLED:true}
    apiKey: ${ANTHROPIC_API_KEY:}
    baseUrl: ${ANTHROPIC_BASE_URL:https://api.anthropic.com}
    model:
      master: ${ANTHROPIC_MODEL_MASTER:claude-sonnet-4-20250514}
      worker: ${ANTHROPIC_MODEL_WORKER:claude-haiku-4-20250514}
    maxTokens: ${ANTHROPIC_MAX_TOKENS:8192}
    temperature: ${ANTHROPIC_TEMPERATURE:0.7}
    timeoutSeconds: ${ANTHROPIC_TIMEOUT:120}

  # Google Gemini Configuration
  gemini:
    enabled: ${GEMINI_ENABLED:false}
    apiKey: ${GEMINI_API_KEY:}
    baseUrl: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
    model:
      master: ${GEMINI_MODEL_MASTER:gemini-2.0-flash-exp}
      worker: ${GEMINI_MODEL_WORKER:gemini-1.5-flash}
    maxTokens: ${GEMINI_MAX_TOKENS:8192}
    temperature: ${GEMINI_TEMPERATURE:0.7}
    timeoutSeconds: ${GEMINI_TIMEOUT:120}

  # OpenAI GPT Configuration
  openai:
    enabled: ${OPENAI_ENABLED:false}
    apiKey: ${OPENAI_API_KEY:}
    baseUrl: ${OPENAI_BASE_URL:https://api.openai.com}
    model:
      master: ${OPENAI_MODEL_MASTER:gpt-4o}
      worker: ${OPENAI_MODEL_WORKER:gpt-4o-mini}
    maxTokens: ${OPENAI_MAX_TOKENS:16384}
    temperature: ${OPENAI_TEMPERATURE:0.7}
    timeoutSeconds: ${OPENAI_TIMEOUT:120}

  # Zhipu GLM Configuration
  zhipu:
    enabled: ${ZHIPU_ENABLED:false}
    apiKey: ${ZHIPU_API_KEY:}
    baseUrl: ${ZHIPU_BASE_URL:https://open.bigmodel.cn}
    model:
      master: ${ZHIPU_MODEL_MASTER:glm-4-plus}
      worker: ${ZHIPU_MODEL_WORKER:glm-4-flash}
    maxTokens: ${ZHIPU_MAX_TOKENS:8192}
    temperature: ${ZHIPU_TEMPERATURE:0.7}
    timeoutSeconds: ${ZHIPU_TIMEOUT:120}

# =============================================================================
# IM Platform Configuration
# =============================================================================
im:
  # Feishu Configuration
  feishu:
    enabled: ${FEISHU_ENABLED:true}
    appId: ${FEISHU_APP_ID:}
    appSecret: ${FEISHU_APP_SECRET:}
    encryptKey: ${FEISHU_ENCRYPT_KEY:}
    verificationToken: ${FEISHU_VERIFICATION_TOKEN:}
    webhook:
      path: ${FEISHU_WEBHOOK_PATH:/webhook/feishu}
      port: ${FEISHU_WEBHOOK_PORT:8080}
    push:
      baseUrl: ${FEISHU_PUSH_BASE_URL:https://open.feishu.cn}
      messageApi: ${FEISHU_MESSAGE_API:/open-apis/im/v1/messages}
    timeoutSeconds: ${FEISHU_TIMEOUT:30}

  # Slack Configuration
  slack:
    enabled: ${SLACK_ENABLED:false}
    signingSecret: ${SLACK_SIGNING_SECRET:}
    botToken: ${SLACK_BOT_TOKEN:}
    webhook:
      path: ${SLACK_WEBHOOK_PATH:/webhook/slack}
      port: ${SLACK_WEBHOOK_PORT:8080}
    push:
      baseUrl: ${SLACK_PUSH_BASE_URL:https://slack.com/api}
      messageApi: ${SLACK_CHAT_API:/api/chat.postMessage}
    timeoutSeconds: ${SLACK_TIMEOUT:30}

# =============================================================================
# Database Configuration
# =============================================================================
database:
  type: ${DB_TYPE:sqlite}
  sqlite:
    path: ${SQLITE_PATH:data/yesboss.db}
    pool:
      enabled: ${SQLITE_POOL_ENABLED:false}
      maxConnections: ${SQLITE_POOL_MAX:10}
      connectionTimeoutMs: ${SQLITE_POOL_TIMEOUT:30000}
    journalMode: ${SQLITE_JOURNAL_MODE:WAL}
    synchronous: ${SQLITE_SYNCHRONOUS:NORMAL}
    cacheSize: ${SQLITE_CACHE_SIZE:-2000}
    tempStore: ${SQLITE_TEMP_STORE:MEMORY}

# =============================================================================
# Scheduler Configuration
# =============================================================================
scheduler:
  # Circuit Breaker Configuration
  circuitBreaker:
    maxLoopCount: ${CIRCUIT_BREAKER_MAX_LOOPS:20}
    checkIntervalMs: ${CIRCUIT_BREAKER_CHECK_INTERVAL:100}

  # Condensation Engine Configuration
  condensation:
    tokenThreshold: ${CONDENSATION_TOKEN_THRESHOLD:120000}
    summarizationIntervalMs: ${CONDENSATION_INTERVAL:60000}
    maxMessagesToCondense: ${CONDENSATION_MAX_MESSAGES:100}

  # Thread Pool Configuration
  threadPool:
    virtualThreadsEnabled: ${VIRTUAL_THREADS_ENABLED:true}
    platformThreadPoolSize: ${PLATFORM_THREAD_POOL_SIZE:16}
    queueCapacity: ${THREAD_QUEUE_CAPACITY:1000}
    keepAliveSeconds: ${THREAD_KEEP_ALIVE:60}

# =============================================================================
# Sandbox Security Configuration
# =============================================================================
sandbox:
  enabled: ${SANDBOX_ENABLED:true}
  # Tool Name Blacklist (exact match)
  toolNameBlacklist:
    - format_disk
    - delete_all
    - wipe_system
    - drop_database

  # Argument Blacklist (regex patterns)
  argumentBlacklist:
    - "rm\\s+-rf\\s+/"
    - "curl.*\\|\\s*bash"
    - "wget.*\\|\\s*sh"
    - "eval\\s*\\("
    - "chmod\\s+000"
    - "chown\\s+-R"
    - "dd\\s+if="
    - ">\\s*/dev/"
    - "mkfs\\."
    - "fdisk"
    - ":\\(\\)\\{\\s*:\\|:\\s*;\\s*\\}"

  # Suspicious file paths
  pathBlacklist:
    - /etc/passwd
    - /etc/shadow
    - ~/.ssh/
    - /root/
    - /boot/
    - /sys/

# =============================================================================
# Logging Configuration
# =============================================================================
logging:
  level: ${LOG_LEVEL:INFO}
  format: ${LOG_FORMAT:text}
  # Console Logging
  console:
    enabled: ${LOG_CONSOLE_ENABLED:true}
    colorized: ${LOG_CONSOLE_COLOR:true}
  # File Logging
  file:
    enabled: ${LOG_FILE_ENABLED:true}
    path: ${LOG_FILE_PATH:logs/yesboss.log}
    maxSize: ${LOG_FILE_MAX_SIZE:100MB}
    maxHistory: ${LOG_FILE_MAX_HISTORY:30}
    totalCapacity: ${LOG_FILE_TOTAL_CAPACITY:1GB}
  # Specific Component Log Levels
  components:
    llm: ${LOG_LEVEL_LLM:DEBUG}
    persistence: ${LOG_LEVEL_PERSISTENCE:INFO}
    scheduler: ${LOG_LEVEL_SCHEDULER:INFO}
    sandbox: ${LOG_LEVEL_SANDBOX:WARN}

# =============================================================================
# Application Configuration
# =============================================================================
app:
  name: YesBoss
  version: ${APP_VERSION:1.0.0}
  environment: ${APP_ENV:development}
  # Server Configuration
  server:
    host: ${SERVER_HOST:0.0.0.0}
    port: ${SERVER_PORT:8080}
    contextPath: ${SERVER_CONTEXT_PATH:/}
  # Task Execution
  task:
    defaultTimeoutMinutes: ${TASK_DEFAULT_TIMEOUT:60}
    maxConcurrentTasks: ${TASK_MAX_CONCURRENT:10}
  # Human-in-the-Loop
  hitl:
    approvalTimeoutMinutes: ${HITL_APPROVAL_TIMEOUT:30}
    maxRetries: ${HITL_MAX_RETRIES:3}
